services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: finally-test-app
    ports:
      - "8000:8000"
    environment:
      - LLM_MOCK=true
      - OPENROUTER_API_KEY=test-key-not-used
    volumes:
      - test-data:/app/db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: finally-test-playwright
    depends_on:
      app:
        condition: service_healthy
    working_dir: /tests
    volumes:
      - .:/tests
    environment:
      - BASE_URL=http://app:8000
    command: >
      bash -c "
        cd /tests &&
        npm ci &&
        npx playwright install chromium &&
        npx playwright test --reporter=list
      "

volumes:
  test-data:
