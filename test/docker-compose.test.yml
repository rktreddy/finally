services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: finally-test
    ports:
      - "8000:8000"
    environment:
      - LLM_MOCK=true
    volumes:
      - finally-test-data:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  finally-test-data:
